name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: detekt
        run: ./gradlew detekt --no-daemon

      - name: Android Lint (incl. strings.xml translation completeness)
        run: ./gradlew lint --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/

      - name: Upload detekt report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: app/build/reports/detekt/

      # `lint` is an alias for `lintDebug` in this project (debug is the only/default
      # variant), so the report AGP writes is still named lint-results-debug.html.
      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-debug.html
